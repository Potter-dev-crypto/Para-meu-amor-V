<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para o amor da minha vida</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #ff9a9e, #fad0c4);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      max-width: 700px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      overflow-y: auto;
      max-height: 90vh;
      text-align: center;
    }
    h1 {
      margin-bottom: 20px;
    }
    #texto {
      text-align: left;
      line-height: 1.7;
      white-space: pre-line;
      margin-top: 15px;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: #ff6b81;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #ff4d6d;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Para você ❤️</h1>
    <button onclick="iniciar()">começar carta 💌</button>
    <p id="texto"></p>
  </div>  <!-- Música de fundo -->  <audio id="musica" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4f3c5f7d2b.mp3" type="audio/mpeg">
  </audio>  <script>
    const textoCompleto = `oi… rs, eu não sou muito bom com textos, mas eu precisava tentar, porque você merece cada palavra que eu tô escrevendo aqui.

saiba que você é uma pessoa incrível e especial, não só pra mim, mas pro mundo inteiro. você consegue ser perfeito em tantos aspectos, em tantos detalhes, em tantas demonstrações… e isso me encanta cada dia mais. o meu amor por você não vai acabar fácil, na verdade, eu sinto que ele só cresce com o tempo, cresce em silêncio, cresce nos detalhes, cresce em cada conversa nossa. e eu espero, de verdade, que o seu por mim também nunca acabe, porque o que a gente tem é raro, é forte, é verdadeiro.

eu nunca quero que você desista de quem você é ou de quem você se tornou. você é uma pessoa extremamente criativa, talentosa e única. você tem um brilho próprio, algo que ninguém consegue copiar. você tem um jeito só seu de ver o mundo, de sentir as coisas, de transformar tudo ao seu redor. e é isso que me faz te admirar tanto. você completa a minha alma de um jeito que eu nem sei explicar direito, como se uma parte de mim sempre tivesse sido sua e só agora eu percebi isso. mesmo estando longe, eu sinto como se a gente estivesse muito perto, como se existisse algo maior conectando a gente o tempo todo.

eu te amo tanto… mas tanto, que às vezes eu travo tentando explicar. parece que nenhuma palavra é suficiente pra descrever o que eu sinto por você. a melhor coisa que já aconteceu na minha vida foi ter te conhecido, foi ter me aproximado de você, foi ter criado essa conexão tão forte. foi poder dizer que eu sou seu namorado… e, quem sabe, um dia, seu esposo. só de imaginar um futuro com você, meu coração fica leve. eu quero passar a minha vida inteira com você, quero construir memórias, viver momentos, dividir sonhos, enfrentar tudo ao seu lado.

eu sempre vou estar aqui por você, em todos os momentos, principalmente nos mais difíceis. quando tudo parecer pesado, quando você sentir que não consegue, eu vou estar do seu lado. não é só porque você é meu namorado… é porque eu te amo de verdade. eu amo te ver feliz, amo quando você sorri, amo quando você me faz sorrir também. você tem esse poder de transformar dias ruins em algo suportável. com você, eu me sinto bem, me sinto seguro, me sinto completo.

nunca desista de você, nunca mesmo. uma pessoa como você merece o mundo inteiro, merece reconhecimento, merece amor, merece tudo de melhor que existe. e eu quero muito, muito mesmo, você pra sempre na minha vida. eu quero estar presente em cada fase, em cada conquista, em cada momento importante. porque eu te amo… eu amo você de um jeito profundo, verdadeiro, intenso. então nunca esquece disso, nem por um segundo.

e se algum dia alguém tentar te diminuir, falar que você não tem talento, que você não é suficiente, ou tentar fazer você duvidar de si mesmo… não acredita. é mentira. você é incrível, você é forte, você é especial. eu nunca vou pensar que você é um fracasso ou que sua vida não tem sentido. pra mim, você é tudo o que importa. você é o meu amor, a metade da minha alma, a pessoa que me faz sorrir mesmo nos dias mais difíceis, a pessoa que me dá forças quando eu nem sabia que precisava.

às vezes eu fico imaginando como teria sido se a gente tivesse se conhecido antes… talvez a gente tivesse vivido ainda mais coisas juntos. mas ao mesmo tempo, eu acredito que a gente se encontrou no momento certo. porque tudo fez sentido quando você apareceu. pode até ter demorado pra gente começar essa história mais romântica, mas o que importa é o agora, é o que a gente construiu, é o sentimento que a gente tem hoje.

eu sempre sonhei com uma história de amor… daquelas bonitas, intensas, que marcam a vida. e eu encontrei você pra ser o protagonista dessa história comigo. você é o amor da minha vida, a pessoa que eu escolho todos os dias, a pessoa com quem eu quero passar anos e anos, dividindo tudo, vivendo tudo, crescendo juntos.

mesmo falando com você todos os dias, eu ainda sinto saudade. e não é uma saudade qualquer… é uma saudade de algo que a gente ainda vai viver. saudade de estar nos seus braços, de sentir seu abraço de verdade, de sentar no seu colo, de deitar com você, de ficar agarrado sem querer soltar. eu fico imaginando esses momentos, criando cenas na minha cabeça, e isso só me faz ter mais certeza ainda de que eu quero você.

eu quero viver tudo isso com você. quero rir com você, chorar com você, superar tudo com você. quero te apoiar nos seus sonhos, quero estar do seu lado quando você conquistar coisas incríveis, quero ser parte da sua história assim como você já é parte da minha.

e acima de tudo, eu quero que você nunca esqueça o quanto você é importante pra mim. nunca esqueça o quanto você é amado, o quanto você é necessário na minha vida. porque sem você, muita coisa perderia o sentido.

você não é só alguém especial… você é o meu lar, mesmo que a gente ainda não esteja no mesmo lugar físico. você é onde eu encontro paz, onde eu encontro conforto, onde eu encontro amor.

e eu prometo que vou continuar te amando, te apoiando e acreditando em você, todos os dias, sem exceção.

com todo o meu amor,
de luan para victor: o amor da minha vida 💖`;

    let i = 0;
    const velocidade = 20;

    function escrever() {
      if (i < textoCompleto.length) {
        document.getElementById("texto").innerHTML += textoCompleto.charAt(i);
        i++;
        setTimeout(escrever, velocidade);
      }
    }

    function iniciar() {
      document.querySelector("button").style.display = "none";
      document.getElementById("musica").play();
      escrever();
    }
  </script></body>
</html>
